<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>No is not an option</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #8ec5ff, #e0c3fc);
      font-family: Arial;
    }

    .box {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      font-family: cursive;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    #yes {
      background: pink;
    }

    #no {
      background: lightgray;
      position: absolute;
    }
  </style>
</head>

<body>

<div class="box">
  <h2> I am smarter than you? 😎</h2>

  <button id="yes">Yes 💖</button>
  <button id="no">No 😏</button>
</div>

<script>
  const noBtn = document.getElementById("no");

  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth - 100;
    const y = Math.random() * window.innerHeight - 100;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  document.getElementById("yes").onclick = () => {
    alert("I knew it 😎");
  };
</script>

</body>
</html>
