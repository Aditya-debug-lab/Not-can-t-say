<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Quick Question...</title>
  <style>
    :root { 
      --pink: #ff85a2; 
      --text: #4a4a4a;
    }

    html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      overflow: hidden;
    }

    .box {
      position: relative;
      width: 340px;
      text-align: center;
      background: white;
      border-radius: 24px;
      padding: 40px 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 10;
    }

    h2 {
      margin: 10px 0 20px;
      font-size: 22px;
      color: var(--text);
      line-height: 1.4;
    }

    .cute-icon { font-size: 70px; margin-bottom: 10px; display: block; }

    .btn-row { 
      margin-top: 20px; 
      display: flex; 
      justify-content: center; 
      gap: 15px; 
      height: 50px; 
    }

    button {
      padding: 12px 28px;
      border-radius: 50px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #yes { background: var(--pink); color: white; box-shadow: 0 4px 15px rgba(255, 133, 162, 0.4); }
    #no { background: #eee; color: #777; position: relative; }

    /* Particles */
    .emoji {
      position: absolute;
      pointer-events: none;
      z-index: 3000;
      animation: fly var(--dur) ease-out forwards;
    }

    @keyframes fly {
      0% { transform: translate(0,0) scale(0); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.2); opacity: 0; }
    }

    /* Celebration Overlay - Now Solid to block the background */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      /* Matches the body gradient but is solid/opaque */
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 2000;
    }
    #overlay.show { opacity: 1; pointer-events: auto; }
    
    .final-msg {
      font-size: 28px;
      font-weight: 800;
      color: #333;
      text-align: center;
      transform: scale(0.5);
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #overlay.show .final-msg { transform: scale(1); }
  </style>
</head>
<body>

  <div class="box" id="card">
    <span class="cute-icon">🫣</span>
    <h2 id="prompt">Am I your favorite person <br>to talk to?</h2>

    <div class="btn-row">
      <button id="yes">Obviously ❤️</button>
      <button id="no">Not really 🙄</button>
    </div>
  </div>

  <div id="overlay">
    <div class="final-msg">
      I knew it! <br>
      <span style="font-size: 80px; display: block; margin: 10px 0;">😏</span>
      <span style="font-size: 18px; color: #555; font-weight: 400;">(You're stuck with me now)</span>
    </div>
  </div>

<script>
  const noBtn = document.getElementById('no');
  const yesBtn = document.getElementById('yes');
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('card');

  // "No" button dodging
  noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * 160 - 80;
    const y = Math.random() * 100 - 50;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
  });

  noBtn.addEventListener('mouseout', () => {
    noBtn.style.transform = `translate(0, 0)`;
  });

  yesBtn.addEventListener('click', () => {
    // 1. Hide the original card completely
    card.style.opacity = '0';
    card.style.transform = 'scale(0.8)';
    
    // 2. Burst effects
    burstEmojis(25);
    
    // 3. Show the solid overlay and clear the card after animation
    setTimeout(() => {
      card.style.display = 'none';
      overlay.classList.add('show');
      burstEmojis(15); 
    }, 300);
  });

  function burstEmojis(count) {
    const list = ['🌸', '✨', '💖', '😏', '🍭', '💌'];
    for (let i = 0; i < count; i++) {
      const e = document.createElement('div');
      e.className = 'emoji';
      e.textContent = list[Math.floor(Math.random() * list.length)];
      
      const startX = window.innerWidth / 2;
      const startY = window.innerHeight / 2;
      
      e.style.left = startX + 'px';
      e.style.top = startY + 'px';
      e.style.fontSize = (Math.random() * 20 + 20) + 'px';
      
      const tx = (Math.random() * 500 - 250) + 'px';
      const ty = (Math.random() * -500 - 50) + 'px';
      const rot = (Math.random() * 360) + 'deg';
      const dur = (Math.random() * 800 + 1000) + 'ms';
      
      e.style.setProperty('--tx', tx);
      e.style.setProperty('--ty', ty);
      e.style.setProperty('--rot', rot);
      e.style.setProperty('--dur', dur);
      
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 1800);
    }
  }
</script>
</body>
</html>
