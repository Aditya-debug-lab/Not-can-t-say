<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Quick Question...</title>
  <style>
    :root { 
      --card-bg: #fff0f6; 
      --pink: #ff85a2; 
      --accent: #f8bbd0; 
      --text: #4a4a4a;
    }

    html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      overflow: hidden;
    }

    .box {
      position: relative;
      width: 340px;
      text-align: center;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 40px 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      backdrop-filter: blur(5px);
    }

    h2 {
      margin: 10px 0 20px;
      font-size: 22px;
      color: var(--text);
      line-height: 1.4;
    }

    .cute-icon {
      font-size: 70px;
      margin-bottom: 10px;
      display: block;
    }

    .btn-row { 
      margin-top: 20px; 
      display: flex; 
      justify-content: center; 
      gap: 15px; 
      position: relative; 
      height: 50px; /* reserved space for dodging */
    }

    button {
      padding: 12px 28px;
      border-radius: 50px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #yes { 
      background: var(--pink); 
      color: white; 
      box-shadow: 0 4px 15px rgba(255, 133, 162, 0.4);
    }
    
    #yes:hover { transform: scale(1.05); }

    #no { 
      background: #eee; 
      color: #777; 
      position: relative;
    }

    /* Particles */
    .emoji {
      position: absolute;
      pointer-events: none;
      z-index: 1000;
      animation: fly var(--dur) ease-out forwards;
    }

    @keyframes fly {
      0% { transform: translate(0,0) scale(0); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.2); opacity: 0; }
    }

    /* Celebration Overlay */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 2000;
    }
    #overlay.show { opacity: 1; pointer-events: auto; }
    
    .final-msg {
      font-size: 28px;
      font-weight: 800;
      color: var(--pink);
      text-align: center;
      transform: scale(0.5);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #overlay.show .final-msg { transform: scale(1); }
  </style>
</head>
<body>

  <div class="box" id="card">
    <span class="cute-icon">🫣</span>
    <h2 id="prompt">Am I your favorite person <br>to talk to?</h2>

    <div class="btn-row">
      <button id="yes">Obviously ❤️</button>
      <button id="no">Not really 🙄</button>
    </div>
  </div>

  <div id="overlay">
    <div class="final-msg">
      I knew it! <br>
      <span style="font-size: 50px;">😘</span><br>
      <span style="font-size: 18px; color: #777; font-weight: 400;">(You're stuck with me now)</span>
    </div>
  </div>

<script>
  const noBtn = document.getElementById('no');
  const yesBtn = document.getElementById('yes');
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('card');

  // "No" button dodging logic
  noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * 140 - 70;
    const y = Math.random() * 80 - 40;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
  });

  // Return to normal when mouse leaves
  noBtn.addEventListener('mouseout', () => {
    noBtn.style.transform = `translate(0, 0)`;
  });

  yesBtn.addEventListener('click', () => {
    // 1. Effects
    burstEmojis(30);
    
    // 2. Show the final message
    setTimeout(() => {
      overlay.classList.add('show');
      burstEmojis(20); // burst more on the final screen
    }, 300);
  });

  function burstEmojis(count) {
    const list = ['🌸', '✨', '💖', '🧸', '🥰', '🍭', '💌'];
    for (let i = 0; i < count; i++) {
      const e = document.createElement('div');
      e.className = 'emoji';
      e.textContent = list[Math.floor(Math.random() * list.length)];
      
      const startX = window.innerWidth / 2;
      const startY = window.innerHeight / 2;
      
      e.style.left = startX + 'px';
      e.style.top = startY + 'px';
      e.style.fontSize = (Math.random() * 20 + 20) + 'px';
      
      const tx = (Math.random() * 400 - 200) + 'px';
      const ty = (Math.random() * -400 - 50) + 'px';
      const rot = (Math.random() * 360) + 'deg';
      const dur = (Math.random() * 800 + 800) + 'ms';
      
      e.style.setProperty('--tx', tx);
      e.style.setProperty('--ty', ty);
      e.style.setProperty('--rot', rot);
      e.style.setProperty('--dur', dur);
      
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 1500);
    }
  }
</script>
</body>
</html>
